<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #ffe5e5;
            text-align: center;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 10px;
        }
        input, select, button {
            margin: 5px;
            padding: 10px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>❤️ Heart Disease Prediction</h1>

<div class="box">

<input type="number" id="age" placeholder="Age">
<select id="sex">
    <option value="">Select Sex</option>
    <option value="1">Male</option>
    <option value="0">Female</option>
</select>

<select id="cp">
    <option value="">Chest Pain</option>
    <option value="0">0</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
</select>

<input type="number" id="bp" placeholder="BP">
<input type="number" id="chol" placeholder="Cholesterol">

<select id="fbs">
    <option value="">FBS</option>
    <option value="0">No</option>
    <option value="1">Yes</option>
</select>

<select id="restecg">
    <option value="">Rest ECG</option>
    <option value="0">Normal</option>
    <option value="1">Abnormal</option>
</select>

<input type="number" id="thalach" placeholder="Heart Rate">

<select id="exang">
    <option value="">Exercise Angina</option>
    <option value="0">No</option>
    <option value="1">Yes</option>
</select>

<input type="number" id="oldpeak" placeholder="Oldpeak">

<select id="slope">
    <option value="">Slope</option>
    <option value="0">0</option>
    <option value="1">1</option>
    <option value="2">2</option>
</select>

<select id="ca">
    <option value="">CA</option>
    <option value="0">0</option>
    <option value="1">1</option>
    <option value="2">2</option>
</select>

<select id="thal">
    <option value="">Thal</option>
    <option value="1">Normal</option>
    <option value="2">Fixed</option>
    <option value="3">Reversible</option>
</select>

<br><br>

<button onclick="predict()">Predict</button>
<button onclick="healthySample()">Healthy Sample</button>
<button onclick="riskySample()">Risky Sample</button>

</div>

<div id="result"></div>

<script>

function getValue(id) {
    let val = document.getElementById(id).value;
    return val === "" ? 0 : parseFloat(val);
}

function predict() {
    let age = getValue("age");
    let bp = getValue("bp");
    let chol = getValue("chol");
    let hr = getValue("thalach");
    let oldpeak = getValue("oldpeak");

    let score = 0;

    if(age > 50) score += 20;
    if(bp > 140) score += 20;
    if(chol > 240) score += 20;
    if(hr < 120) score += 20;
    if(oldpeak > 2) score += 20;

    showResult(score);
}

function healthySample() {
    document.getElementById("age").value = 30;
    document.getElementById("bp").value = 110;
    document.getElementById("chol").value = 180;
    document.getElementById("thalach").value = 180;
    document.getElementById("oldpeak").value = 0.1;

    showResult(15); // always LOW
}

function riskySample() {
    document.getElementById("age").value = 65;
    document.getElementById("bp").value = 160;
    document.getElementById("chol").value = 300;
    document.getElementById("thalach").value = 110;
    document.getElementById("oldpeak").value = 3;

    showResult(85); // always HIGH
}

function showResult(prob) {
    let risk = "";
    let tips = [];
    let precautions = [];

    if(prob < 35){
        risk = "Low";
        tips = ["Stay active", "Eat healthy", "Exercise daily"];
        precautions = ["Avoid junk food", "Check BP regularly"];
    }
    else if(prob < 65){
        risk = "Medium";
        tips = ["Reduce oil food", "Exercise daily"];
        precautions = ["Avoid stress", "Consult doctor"];
    }
    else{
        risk = "High";
        tips = ["Consult doctor", "Strict diet needed"];
        precautions = ["Avoid smoking", "Take medicines regularly"];
    }

    document.getElementById("result").innerHTML = `
        <div class="box result">
            <h2>${risk} Risk</h2>
            <p>Probability: ${prob}%</p>

            <h3>Tips</h3>
            <ul>${tips.map(t => `<li>${t}</li>`).join("")}</ul>

            <h3>Precautions</h3>
            <ul>${precautions.map(p => `<li>${p}</li>`).join("")}</ul>
        </div>
    `;
}

</script>

</body>
</html>
